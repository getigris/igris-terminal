[colors.bright]
black   = "#565f89"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

[colors.accent]
primary   = "#7aa2f7"
secondary = "#bb9af7"
info      = "#7dcfff"
success   = "#73daca"
warning   = "#e0af68"
error     = "#f7768e"
