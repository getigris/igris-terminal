# Tokyo Night color palette
# Source of truth for all tool-specific color configs

[meta]
name = "Tokyo Night"
author = "ig-term"
variant = "dark"

[colors]
background = "#1a1b26"
foreground = "#a9b1d6"
cursor = "#c0caf5"
