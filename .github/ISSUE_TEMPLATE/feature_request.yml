name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion! Please describe the feature you'd like.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation are you hitting? What's the pain point?
      placeholder: "I need to... but currently ig-term doesn't support..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they don't work.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Module (new)
        - Module (existing)
        - Theme
        - Prompt preset
        - CLI
        - Install / Setup
        - Cross-platform
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, config snippets, references, or anything else.
